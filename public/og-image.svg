<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">LinkLens QR code scanner</title>
  <desc id="desc">LinkLens branding for scanning QR codes and checking link destinations.</desc>
  <rect width="1200" height="630" fill="#f5f7f8"/>
  <rect x="72" y="72" width="1056" height="486" rx="36" fill="#ffffff" stroke="#dbe3e6" stroke-width="2"/>
  <g transform="translate(130 160)">
    <circle cx="100" cy="100" r="84" fill="#e8f7f4" stroke="#0b6f63" stroke-width="14"/>
    <path d="M160 160L222 222" stroke="#0b6f63" stroke-width="24" stroke-linecap="round"/>
    <g fill="#123036">
      <rect x="62" y="58" width="30" height="30" rx="4"/>
      <rect x="110" y="58" width="30" height="30" rx="4"/>
      <rect x="62" y="108" width="30" height="30" rx="4"/>
      <rect x="110" y="108" width="20" height="20" rx="4"/>
      <rect x="140" y="108" width="16" height="16" rx="3"/>
      <rect x="110" y="140" width="16" height="16" rx="3"/>
      <rect x="140" y="140" width="24" height="24" rx="4"/>
    </g>
  </g>
  <text x="410" y="245" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="86" font-weight="850" fill="#123036" letter-spacing="0">LinkLens</text>
  <text x="414" y="318" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="750" fill="#0b6f63" letter-spacing="0">Scan QR codes and see where links lead.</text>
  <text x="414" y="386" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" fill="#5b6970" letter-spacing="0">Upload images, crop QR codes, review redirects, and check QR code links before opening.</text>
  <text x="414" y="455" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#123036" letter-spacing="0">Built by Abhijay Panwar, a student developer based in Texas</text>
</svg>
